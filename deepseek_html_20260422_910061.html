<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Offline AI Character | Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 20;
            pointer-events: auto;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #userInput {
            flex: 2;
            padding: 10px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 16px;
            background: #2a2a2a;
            color: white;
        }
        button {
            padding: 10px 20px;
            border-radius: 30px;
            border: none;
            background: #ff9800;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #ffb74d; }
        #aiStatus {
            background: #1e1e1e;
            padding: 8px 15px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            #controls { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="info">
        🧠 Offline AI Character | Real ONNX Model | Procedural Motion
    </div>
    <div id="controls">
        <input type="text" id="userInput" placeholder="Type something to the character... (AI will decide behavior)">
        <button id="sendBtn">Send to AI</button>
        <div id="aiStatus">🤖 AI: idle</div>
    </div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
